<!-- 
  GENERIC WEBSITE TRACKING CODE
  
  This tracks page views on any website using the same Firebase account.
  Add this code BEFORE the closing </body> tag on any page you want to track.
  
  CUSTOMIZE:
  1. Change WEBSITE_ID to identify your website (e.g., 'my-portfolio', 'blog', 'shop')
  2. Change PAGE_NAME to identify the page (e.g., 'home', 'about', 'contact')
  3. Optionally track user actions (button clicks, form submissions, etc.)
-->

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getDatabase, ref, set, onDisconnect } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

  // Your Firebase configuration (same as invitation site)
  const firebaseConfig = {
    apiKey: "AIzaSyDobJoThr66qCjl7ULmA6q37iIPo5rSoIA",
    authDomain: "onlinebus-b50f9.firebaseapp.com",
    databaseURL: "https://onlinebus-b50f9-default-rtdb.firebaseio.com",
    projectId: "onlinebus-b50f9",
    storageBucket: "onlinebus-b50f9.firebasestorage.app",
    messagingSenderId: "522275438422",
    appId: "1:522275438422:web:bc748e514a1074117ea0f7"
  };

  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);

  // ⚠️ CUSTOMIZE THESE:
  const WEBSITE_ID = 'https://sadat934.github.io/knowledgemanagementsystem/';  // Change this to identify your website
  const PAGE_NAME = window.location.pathname || 'home';  // Auto-detects page, or set manually

  // Generate unique visitor ID (persists across pages)
  let visitorId = sessionStorage.getItem('visitor_id');
  if (!visitorId) {
    visitorId = 'visitor_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    sessionStorage.setItem('visitor_id', visitorId);
  }

  // Detect device and browser
  function getDeviceInfo() {
    const ua = navigator.userAgent;
    let device = 'Desktop';
    
    if (/mobile/i.test(ua)) device = 'Mobile';
    else if (/tablet|ipad/i.test(ua)) device = 'Tablet';
    
    if (/iPhone/i.test(ua)) device = 'iPhone';
    else if (/Android/i.test(ua) && /mobile/i.test(ua)) device = 'Android Phone';
    else if (/Android/i.test(ua)) device = 'Android Tablet';
    else if (/iPad/i.test(ua)) device = 'iPad';
    
    let browser = 'Unknown';
    if (ua.indexOf('Firefox') > -1) browser = 'Firefox';
    else if (ua.indexOf('SamsungBrowser') > -1) browser = 'Samsung Browser';
    else if (ua.indexOf('Opera') > -1 || ua.indexOf('OPR') > -1) browser = 'Opera';
    else if (ua.indexOf('Edge') > -1) browser = 'Edge';
    else if (ua.indexOf('Chrome') > -1) browser = 'Chrome';
    else if (ua.indexOf('Safari') > -1) browser = 'Safari';
    
    return { device, browser };
  }

  const { device, browser } = getDeviceInfo();
  let startTime = Date.now();
  let pageViews = 0;

  // Track visitor activity
  function updateVisitor() {
    const duration = Math.floor((Date.now() - startTime) / 1000);
    
    set(ref(database, `websites/${WEBSITE_ID}/visitors/${visitorId}`), {
      page: PAGE_NAME,
      device: device,
      browser: browser,
      lastSeen: Date.now(),
      duration: duration,
      pageViews: pageViews,
      referrer: document.referrer || 'direct',
      timestamp: Date.now()
    }).then(() => {
      console.log('✅ Visitor tracked:', WEBSITE_ID, PAGE_NAME);
    }).catch((error) => {
      console.error('❌ Tracking error:', error);
    });
  }

  // Track page view
  pageViews++;
  updateVisitor();

  // Update every 30 seconds
  setInterval(updateVisitor, 30000);

  // Save last seen when disconnecting
  onDisconnect(ref(database, `websites/${WEBSITE_ID}/visitors/${visitorId}`)).update({
    lastSeen: Date.now()
  });

  // Track when page becomes visible/hidden
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible') {
      startTime = Date.now();
      updateVisitor();
    } else {
      updateVisitor();
    }
  });

  // Optional: Track custom events
  window.trackEvent = function(eventName, eventData = {}) {
    const eventRef = ref(database, `websites/${WEBSITE_ID}/events/${Date.now()}_${Math.random().toString(36).substr(2, 9)}`);
    set(eventRef, {
      visitorId: visitorId,
      eventName: eventName,
      eventData: eventData,
      page: PAGE_NAME,
      timestamp: Date.now()
    });
    console.log('📊 Event tracked:', eventName, eventData);
  };
</script>

<!-- 
  USAGE EXAMPLES:
  
  1. Track button clicks:
     <button onclick="trackEvent('button_click', {button: 'signup'})">Sign Up</button>
  
  2. Track form submissions:
     <form onsubmit="trackEvent('form_submit', {form: 'contact'})">
  
  3. Track custom actions:
     trackEvent('video_play', {video: 'intro'});
     trackEvent('download', {file: 'brochure.pdf'});
-->
